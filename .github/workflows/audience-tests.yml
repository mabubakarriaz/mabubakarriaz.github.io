name: Audience Infrastructure Tests
run-name: "Audience Tests — ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.ref_name }}"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  audience-tests:
    name: Run Playwright Audience Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Wait for GitHub Pages deployment
        # On push to main, wait briefly for GitHub Pages to rebuild before testing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sleep 60

      - name: Run Audience tests (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: tests
        run: npm run test:audience
        env:
          BASE_URL: https://abubakarriaz.com.pk

      - name: Setup Ruby
        if: github.event_name == 'pull_request'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site locally for PR tests
        if: github.event_name == 'pull_request'
        run: |
          bundle exec jekyll build
          bundle exec jekyll serve --detach --port 4000

      - name: Run Audience tests (PR preview)
        if: github.event_name == 'pull_request'
        working-directory: tests
        run: npm run test:audience:local
        env:
          BASE_URL: http://localhost:4000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-audience
          path: tests/playwright-report/
          retention-days: 14
